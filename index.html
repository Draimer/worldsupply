        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #13131a;
            color: #e2e8f0;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2d; }
        ::-webkit-scrollbar-thumb { background: #3f3f5a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5c5c7d; }
        .map-container {
            background: radial-gradient(circle at center, #1e1e2d 0%, #13131a 100%);
        }

        /* 產品圖與 LOGO 樣式 */
        .product-img-wrap {
            position: relative;
            background: linear-gradient(135deg, var(--cat-color-start, #1e1e2d) 0%, var(--cat-color-end, #13131a) 100%);
            border-radius: 8px;
            overflow: hidden;
        }
        .product-img-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
        }
        .product-img-wrap .cat-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        .product-img-wrap .brand-tag {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 7px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .logo-badge {
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            overflow: hidden;
        }
        .logo-badge img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .logo-badge.text-only {
            background: linear-gradient(135deg, #2a2a40, #1e1e2d);
            color: #e2e8f0;
            font-weight: 900;
            font-size: 8px;
            letter-spacing: 0.3px;
            padding: 2px;
            line-height: 1;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        /* 動效 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease-out; }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        .pulse-glow { animation: pulseGlow 2s infinite; }

        .glass-card {
            background: rgba(21, 21, 31, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* ================================================
           響應式:產品詳細卡
           Mobile (預設):底部抽屜,從下往上滑
           Desktop (md+):右上角懸浮,從右往左滑
           ================================================ */
        #product-detail-card {
            position: fixed;
            inset: auto 0 0 0;
            width: auto;
            max-height: 78vh;
            border-radius: 20px 20px 0 0;
            overflow-y: auto;
            overflow-x: hidden;
            transform: translateY(calc(100% + 24px));
            opacity: 0;
            pointer-events: none;
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            z-index: 50;
        }
        #product-detail-card.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        /* 手機底部抽屜拖曳指示條 */
        .drag-handle {
            display: block;
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin: 10px auto -6px;
            position: relative;
            z-index: 25;
        }
        /* 關閉按鈕 */
        .detail-close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 9999px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 30;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            cursor: pointer;
        }
        .detail-close-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }

        @media (min-width: 768px) {
            #product-detail-card {
                position: absolute;
                inset: 24px 24px auto auto;
                width: 320px;
                max-height: calc(100vh - 48px);
                border-radius: 12px;
                transform: translateX(48px);
                overflow-y: auto;
                z-index: 20;
            }
            #product-detail-card.visible { transform: translateX(0); }
            .drag-handle { display: none; }
        }

        /* ================================================
           響應式:圖例說明 (手機縮小)
           ================================================ */
        #legend-box {
            padding: 10px 12px;
            font-size: 10px;
        }
        #legend-box h3 { font-size: 11px; }
        #legend-box .legend-row { font-size: 10px; }
        @media (min-width: 768px) {
            #legend-box {
                padding: 16px;
                font-size: 12px;
            }
            #legend-box h3 { font-size: 14px; }
            #legend-box .legend-row { font-size: 12px; }
        }

        /* ================================================
           響應式:手機側邊欄滾動優化 + 觸控
           ================================================ */
        @media (max-width: 767px) {
            /* 手機端放大觸控區、加粗間距 */
            #item-list-container { padding: 12px; }
            #item-list-container li { min-height: 72px; }
            /* 標題區縮小 */
            .sidebar-header { padding: 14px 18px; }
            .sidebar-header h1 { font-size: 1.1rem; }
            .sidebar-header p { font-size: 11px; }
        }

        /* 防止 iOS Safari 手機旋轉時異常滾動 */
        html, body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
    </style>
</head>

        }

        const flagImg = (country) => `<img src="${flags[country]}" class="inline-block w-4 h-[11px] rounded-[2px] object-cover align-middle shadow-sm">`;

        // 系統狀態
        let currentSelected = null;
        let myChart = null;

        // --- [核心改善] LOGO 與產品圖生成函式 ---

        /**
         * 生成品牌 LOGO 的 HTML (優先讀取本地圖 + 文字 fallback)
         * 採「疊層 fallback」:文字 LOGO 永遠在底層渲染,圖片蓋在上面;
         * 若圖片載入失敗,img 自動 display:none,露出底層的文字 LOGO。
         */
        function getBrandLogoHTML(item, sizeClass = 'w-11 h-11') {
            const displayText = item.logoText || item.brandName;
            const imgOverlay = item.logo
                ? `<img src="${item.logo}" alt="${item.brandName}" loading="lazy"
                        class="absolute inset-0 w-full h-full object-contain bg-white rounded-md p-0.5"
                        onerror="this.style.display='none'">`
                : '';
            return `<div class="logo-badge text-only ${sizeClass} shrink-0 relative overflow-hidden">
                        <span>${displayText}</span>
                        ${imgOverlay}
                    </div>`;
        }

        /**
         * 生成產品圖片的 HTML (優先讀取本地圖 + SVG emoji fallback)
         * 採「疊層 fallback」:類別漸層 + emoji 永遠在底層渲染;
         * 實際產品圖蓋在上面,若載入失敗則自動隱藏,露出底層樣式。
         */
        function getProductImageHTML(item, sizeClass = 'w-16 h-16', showBrand = true) {
            const cat = categories[item.cat];
            const style = `--cat-color-start:${cat.gradStart};--cat-color-end:${cat.gradEnd};`;
            const imgOverlay = item.productImg
                ? `<img src="${item.productImg}" alt="${item.name}" loading="lazy"
                        class="absolute inset-0 w-full h-full object-cover rounded-lg"
                        onerror="this.style.display='none'">`
                : '';
            return `<div class="product-img-wrap ${sizeClass} shrink-0 flex items-center justify-center relative" style="${style}">
                        <span class="cat-icon">${item.emoji}</span>
                        ${showBrand ? `<span class="brand-tag">${item.brandName}</span>` : ''}
                        ${imgOverlay}
                    </div>`;
        }

        /**
         * 產品詳細卡的大型 Hero 圖 (較精緻的視覺效果)
         * 同樣採疊層 fallback:類別漸層背景 + 大 emoji 永遠在底,產品圖蓋上去
         */
        function getProductHeroImageHTML(item) {
            const cat = categories[item.cat];
            const style = `background: linear-gradient(135deg, ${cat.gradStart} 0%, ${cat.gradEnd} 100%);`;
            const imgOverlay = item.productImg
                ? `<img src="${item.productImg}" alt="${item.name}" loading="lazy"
                        class="absolute inset-0 w-full h-full object-cover z-10"
                        onerror="this.style.display='none'">`
                : '';
            return `
                <div class="w-full h-full relative flex items-center justify-center" style="${style}">
                    <div class="absolute inset-0" style="background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 50%);"></div>
                    <div class="text-7xl" style="filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));">${item.emoji}</div>
                    ${imgOverlay}
                    <div class="absolute top-3 left-3 px-2 py-0.5 bg-black/40 backdrop-blur-sm rounded-full text-[10px] text-white/90 font-medium border border-white/10 z-20">
                        ${cat.icon} ${item.cat}
                    </div>
                    <div class="absolute bottom-3 right-3 text-[10px] font-black tracking-wider text-white/70 bg-black/40 backdrop-blur-sm px-2 py-0.5 rounded-full z-20">
                        ${item.brandName}
                    </div>
                </div>
            `;
        }

        // --- 2. 預計算曲線弧度 ---
        function initData() {
            const routeCount = {};
            itemsData.forEach(item => {
                if (item.brand !== item.mfg) {
                    const id = `${item.brand}-${item.mfg}`;
                    routeCount[id] = (routeCount[id] || 0) + 1;
                    item.bmCurve = 0.2 + (routeCount[id] * 0.05);
                }
                if (item.mfg !== "台灣") {
                    const id = `${item.mfg}-台灣`;
                    routeCount[id] = (routeCount[id] || 0) + 1;
                    item.muCurve = -0.1 - (routeCount[id] * 0.06);
                }
            });
        }

        // --- 3. 點擊互動 ---
        window.toggleItem = function(itemName) {
            if (currentSelected === itemName) {
                currentSelected = null;
            } else {
                currentSelected = itemName;
            }
            renderSidebar();
            renderMap();
            renderProductCard();
        }

        window.resetView = function() {
            currentSelected = null;
            renderSidebar();
            renderMap();
            renderProductCard();
        }

        // --- 4. 產品詳細資訊卡 ---
        function renderProductCard() {
            const card = document.getElementById('product-detail-card');

            if (!currentSelected) {
                card.classList.remove('visible');
                return;
            }

            const item = itemsData.find(i => i.name === currentSelected);

            // Hero 圖
            document.getElementById('product-hero-img').innerHTML = getProductHeroImageHTML(item);

            // 基本資訊
            document.getElementById('product-title').textContent = item.name;
            document.getElementById('product-brand-name').textContent = item.brandName;
            document.getElementById('product-price').textContent = item.price;
            document.getElementById('product-desc').textContent = item.desc;

            // 標題旁的小 Logo
            document.getElementById('product-logo-container').innerHTML = getBrandLogoHTML(item, 'w-10 h-10');

            // 產地
            document.getElementById('product-brand-route-origin').innerHTML = `${flagImg(item.brand)} <span class="ml-1">${item.brand}</span>`;
            document.getElementById('product-brand-route-mfg').innerHTML = `${flagImg(item.mfg)} <span class="ml-1">${item.mfg}</span>`;

            card.classList.add('visible');
        }

        // --- 5. 繪製側邊欄 ---
        function renderSidebar() {
            const container = document.getElementById('item-list-container');
            const grouped = {};
            Object.keys(categories).forEach(cat => grouped[cat] = []);
            itemsData.forEach(item => grouped[item.cat].push(item));

            let html = '';
            for (const [catName, items] of Object.entries(grouped)) {
                if(items.length === 0) continue;
                const catInfo = categories[catName];

                html += `
                <div class="bg-[#1e1e2d] rounded-xl border border-gray-800 overflow-hidden shadow-sm">
                    <div class="px-4 py-3 border-b border-gray-800 flex items-center gap-2" style="background-color: ${catInfo.color}15;">
                        <span class="text-lg">${catInfo.icon}</span>
                        <h3 class="font-bold text-sm tracking-wider" style="color: ${catInfo.color}">${catName}</h3>
                        <span class="ml-auto text-[10px] text-gray-500 bg-gray-800/60 px-2 py-0.5 rounded-full">${items.length}</span>
                    </div>
                    <ul class="divide-y divide-gray-800">
                `;

                items.forEach(item => {
                    const isSameOrigin = item.brand === item.mfg;
                    const isSelected = currentSelected === item.name;
                    const isOtherSelected = currentSelected !== null && !isSelected;

                    const activeBg = isSelected ? 'bg-[#2a2a40] border-l-4' : 'hover:bg-[#252536] border-l-4 border-transparent';
                    const opacityClass = isOtherSelected ? 'opacity-40' : 'opacity-100';

                    // 產品圖 (左側大圖) + LOGO 浮水印 (右下角小徽章)
                    const productImg = getProductImageHTML(item, 'w-16 h-16', true);
                    const brandLogo = getBrandLogoHTML(item, 'w-8 h-8');

                    html += `
                        <li onclick="toggleItem('${item.name}')"
                            class="px-4 py-3 cursor-pointer transition-all duration-300 group ${activeBg} ${opacityClass}"
                            style="${isSelected ? `border-left-color: ${catInfo.color};` : ''}">
                            <div class="flex items-center gap-3">
                                <!-- 產品圖 + LOGO 徽章組合 -->
                                <div class="relative shrink-0">
                                    ${productImg}
                                    <div class="absolute -bottom-1 -right-1 shadow-lg rounded-md">
                                        ${brandLogo}
                                    </div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex justify-between items-start gap-2">
                                        <div class="text-sm font-medium truncate ${isSelected ? 'text-white' : 'text-gray-200'}">${item.name}</div>
                                        <div class="text-[11px] font-mono font-bold text-blue-300 whitespace-nowrap mt-0.5">${item.price}</div>
                                    </div>
                                    <div class="text-[10px] text-gray-500 truncate mt-0.5">${item.desc.slice(0, 26)}...</div>
                                    <div class="flex items-center gap-1.5 mt-1.5 text-[11px]">
                                        <span class="px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 border border-gray-700 flex items-center gap-1">牌: ${flagImg(item.brand)} ${item.brand}</span>
                                        ${!isSameOrigin ? `<span class="text-gray-600">➔</span>
                                        <span class="px-1.5 py-0.5 rounded bg-gray-700 text-white shadow-sm border border-gray-600 flex items-center gap-1">製: ${flagImg(item.mfg)} ${item.mfg}</span>` :
                                        `<span class="px-1.5 py-0.5 rounded bg-green-900/40 text-green-400 border border-green-800 flex items-center gap-1">${flagImg(item.mfg)} 當地製造</span>`}
                                    </div>
                                </div>
                            </div>
                        </li>
                    `;
                });
                html += `</ul></div>`;
            }
            container.innerHTML = html;
        }

        // --- 6. 繪製地圖 ---
        function renderMap() {
            const inactiveBm = [];
            const inactiveMu = [];
            const activeBm = [];
            const activeMu = [];
            const scatterData = [];

            itemsData.forEach(item => {
                const color = categories[item.cat].color;
                const isSelected = currentSelected === item.name;
                const isOtherSelected = currentSelected !== null && !isSelected;

                const opacity = isOtherSelected ? 0.05 : 0.6;
                const width = 1.5;

                const baseStyle = { color, curveness: item.bmCurve, width, opacity };
                const activeStyle = { color, curveness: item.bmCurve, width: 4, opacity: 1, shadowBlur: 15, shadowColor: color };

                if (item.brand !== item.mfg) {
                    const dataObj = {
                        coords: [geoCoords[item.brand], geoCoords[item.mfg]],
                        value: item.name,
                        detail: `【設計】${flagImg(item.brand)} ${item.brand} ➔ 【代工】${flagImg(item.mfg)} ${item.mfg}`
                    };
                    if (isSelected) activeBm.push({ ...dataObj, lineStyle: activeStyle });
                    else inactiveBm.push({ ...dataObj, lineStyle: baseStyle });
                }

                if (item.mfg !== "台灣") {
                    const dataObj = {
                        coords: [geoCoords[item.mfg], geoCoords["台灣"]],
                        value: item.name,
                        detail: `【出貨】${flagImg(item.mfg)} ${item.mfg} ➔ 【使用】${flagImg("台灣")} 台灣`
                    };
                    if (isSelected) activeMu.push({ ...dataObj, lineStyle: { ...activeStyle, curveness: item.muCurve } });
                    else inactiveMu.push({ ...dataObj, lineStyle: { ...baseStyle, curveness: item.muCurve } });
                }
            });

            Object.keys(geoCoords).forEach(country => {
                let symbolType = 'circle';
                let symbolSize = 8;
                let color = '#a1a1aa';

                const isBrand = itemsData.some(i => i.brand === country);
                const isMfg = itemsData.some(i => i.mfg === country);
                const isTarget = country === "台灣";

                if (isTarget) {
                    symbolType = 'path://M512 341.5c-94.1 0-170.5 76.4-170.5 170.5s76.4 170.5 170.5 170.5 170.5-76.4 170.5-170.5-76.4-170.5-170.5-170.5z M512 85.5C276.4 85.5 85.5 276.4 85.5 512s190.9 426.5 426.5 426.5 426.5-190.9 426.5-426.5S747.6 85.5 512 85.5z';
                    symbolSize = 25;
                    color = '#ef4444';
                } else if (isBrand && isMfg) {
                    symbolType = 'roundRect'; symbolSize = 10; color = '#10b981';
                } else if (isMfg) {
                    symbolType = 'rect'; symbolSize = 8; color = '#fcd34d';
                } else if (isBrand) {
                    symbolType = 'emptyCircle'; symbolSize = 12; color = '#60a5fa';
                }

                let isRelated = true;
                if (currentSelected) {
                    const item = itemsData.find(i => i.name === currentSelected);
                    isRelated = (country === item.brand || country === item.mfg || country === "台灣");
                }

                scatterData.push({
                    name: country,
                    value: [...geoCoords[country], 1],
                    symbol: symbolType,
                    symbolSize: (isRelated && currentSelected && !isTarget) ? symbolSize + 4 : symbolSize,
                    itemStyle: {
                        color: color,
                        opacity: isRelated ? 1 : 0.15,
                        borderWidth: isBrand && !isMfg ? 2 : 0,
                        borderColor: isBrand && !isMfg ? color : 'transparent'
                    }
                });
            });

            const richConfig = {};
            Object.keys(countryCodes).forEach(country => {
                richConfig[countryCodes[country]] = {
                    backgroundColor: { image: flags[country] },
                    height: 11,
                    width: 16,
                    borderRadius: 2
                };
            });

            let targetCenter = [110, 30];
            let targetZoom = 1.6;

            if (currentSelected) {
                const item = itemsData.find(i => i.name === currentSelected);
                const pts = [geoCoords[item.brand], geoCoords[item.mfg], geoCoords["台灣"]];

                let minLng = Math.min(...pts.map(p=>p[0]));
                let maxLng = Math.max(...pts.map(p=>p[0]));
                let minLat = Math.min(...pts.map(p=>p[1]));
                let maxLat = Math.max(...pts.map(p=>p[1]));

                targetCenter = [(minLng + maxLng) / 2, (minLat + maxLat) / 2];

                let maxDiff = Math.max(maxLng - minLng, maxLat - minLat);
                targetZoom = Math.max(1, Math.min(100 / (maxDiff || 10), 4));
            }

            const option = {
                backgroundColor: {
                    type: 'radial',
                    x: 0.5, y: 0.5, r: 0.8,
                    colorStops: [
                        { offset: 0, color: '#1e1e2d' },
                        { offset: 1, color: '#13131a' }
                    ]
                },
                animationDurationUpdate: 1000,
                animationEasingUpdate: 'cubicInOut',
                tooltip: {
                    trigger: 'item',
                    confine: true, // 手機上限制在畫面內,避免溢出
                    backgroundColor: 'rgba(21, 21, 31, 0.95)',
                    borderColor: '#3f3f5a',
                    textStyle: { color: '#e2e8f0' },
                    formatter: function (params) {
                        if (params.seriesType === 'lines') {
                            return `<div class="font-bold text-sm mb-1" style="color:${params.data.lineStyle.color}">${params.data.value}</div>
                                    <div class="text-xs text-gray-400">${params.data.detail}</div>`;
                        } else if (params.seriesType === 'scatter' || params.seriesType === 'effectScatter') {
                            const country = params.data.name;
                            const related = itemsData.filter(i => i.brand === country || i.mfg === country);
                            let content = `<div class="font-bold text-sm mb-2 text-white border-b border-gray-600 pb-1 flex items-center gap-2">${flagImg(country)} ${country}</div>`;
                            related.forEach(item => {
                                let role = [];
                                if(item.brand === country) role.push('品牌');
                                if(item.mfg === country) role.push('製造');
                                content += `<div class="text-xs mb-1 flex justify-between items-center gap-4"><span class="truncate"><span class="text-gray-400 mr-2">[${role.join('/')}]</span><span style="color:${categories[item.cat].color}">${item.name}</span></span> <span class="text-gray-500 font-mono text-[10px] whitespace-nowrap">${item.price}</span></div>`;
                            });
                            if (country === "台灣") {
                                content += `<div class="text-xs mt-2 text-red-400 font-bold border-t border-gray-600 pt-1">★ 最終使用者所在地</div>`;
                            }
                            return content;
                        }
                    }
                },
                geo: {
                    map: 'world',
                    roam: true,
                    center: targetCenter,
                    zoom: targetZoom,
                    label: { emphasis: { show: false } },
                    itemStyle: { areaColor: '#252536', borderColor: '#3a3a52', borderWidth: 1 },
                    emphasis: { itemStyle: { areaColor: '#34344a' } }
                },
                series: [
                    {
                        type: 'lines', zlevel: 1, effect: { show: false },
                        lineStyle: { type: 'dashed' }, data: inactiveBm
                    },
                    {
                        type: 'lines', zlevel: 10, effect: { show: false },
                        lineStyle: { type: 'dashed' }, data: activeBm
                    },
                    {
                        type: 'lines', zlevel: 2,
                        effect: { show: currentSelected === null, period: 4, trailLength: 0, symbol: 'arrow', symbolSize: 5 },
                        lineStyle: { type: 'solid' }, data: inactiveMu
                    },
                    {
                        type: 'lines', zlevel: 11,
                        effect: { show: true, period: 3, trailLength: 0.4, symbol: 'arrow', symbolSize: 10 },
                        lineStyle: { type: 'solid' }, data: activeMu
                    },
                    {
                        type: 'scatter', coordinateSystem: 'geo', zlevel: 20,
                        label: {
                            show: true, position: 'right',
                            formatter: function(p) { return '{' + countryCodes[p.name] + '|} ' + p.name; },
                            rich: richConfig,
                            color: '#a1a1aa', fontSize: 10, textBorderColor: '#13131a', textBorderWidth: 2
                        },
                        data: scatterData.filter(d => d.name !== '台灣')
                    },
                    {
                        type: 'effectScatter', coordinateSystem: 'geo', zlevel: 21,
                        rippleEffect: { brushType: 'stroke', scale: 2.5 },
                        label: {
                            show: true, position: 'bottom',
                            formatter: function(p) { return '{' + countryCodes[p.name] + '|} ' + p.name + ' (你)'; },
                            rich: richConfig,
                            color: '#ef4444', fontWeight: 'bold', textBorderColor: '#000', textBorderWidth: 2
                        },
                        itemStyle: { color: '#ef4444' },
                        data: scatterData.filter(d => d.name === '台灣')
                    }
                ]
            };

            myChart.setOption(option);
        }

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', () => {
            initData();
            myChart = echarts.init(document.getElementById('echarts-map'));

            // 響應式:視窗 / 手機旋轉時重新繪製地圖
            let resizeTimer;
            const handleResize = () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    myChart.resize();
                    renderMap(); // 重繪以套用新的中心與縮放
                }, 150);
            };
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', handleResize);

            // ESC 鍵關閉產品詳細卡
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentSelected) {
                    resetView();
                }
            });

            renderSidebar();
            renderMap();
        });
    </script>
</body>
</html>
